<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prem Tilokani | Connect</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:#f9fafb;
    color:#0f172a;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

.container{
    width:100%;
    max-width:400px;
    background:white;
    padding:50px 30px;
    border-radius:8px;
    box-shadow:0 4px 6px rgba(0,0,0,.05);
    text-align:center;
}

h1{
    font-size:1.75rem;
    margin-bottom:30px;
}

.links{
    display:flex;
    flex-direction:column;
    gap:12px;
}

.links a{
    display:block;
    padding:14px 20px;
    background:white;
    color:#0f172a;
    text-decoration:none;
    border:1px solid #cbd5e1;
    border-radius:6px;
    transition:.2s;
}

.links a:hover{
    background:#0f172a;
    color:white;
    transform:translateY(-1px);
}

/* Hidden password field */
#secretPassword{
    position:fixed;
    bottom:8px;
    right:8px;

    width:40px;
    height:18px;

    opacity:0.03;

    border:none;
    background:transparent;
    outline:none;

    color:transparent;

    z-index:999;
}

/* Secret Page */
#secretPage{
    position:fixed;
    inset:0;

    background:#000;

    opacity:0;
    visibility:hidden;

    transition:.4s;

    z-index:9999;
}

#secretPage.active{
    opacity:1;
    visibility:visible;
}

#secretImage{
    width:100%;
    min-height:100vh;
    object-fit:contain;
    display:block;
    margin:auto;
}

#closeBtn{
    position:fixed;
    top:20px;
    right:20px;

    width:45px;
    height:45px;

    border:none;
    border-radius:50%;

    background:rgba(255,255,255,.15);
    color:white;

    font-size:24px;
    cursor:pointer;

    backdrop-filter:blur(10px);
}
</style>
</head>
<body>

<div class="container">
    <h1>Prem Tilokani</h1>

    <div class="links">
        <a href="https://www.linkedin.com/in/prem-tilokani-8b85b624b" target="_blank">LinkedIn</a>
        <a href="https://github.com/blurry-eyez" target="_blank">GitHub</a>
        <a href="https://wa.me/916351929739" target="_blank">WhatsApp</a>
        <a href="https://instagram.com/prem_tilokani" target="_blank">Instagram</a>
    </div>
</div>

<!-- Invisible Password Field -->
<input
    type="password"
    id="secretPassword"
    autocomplete="off"
>

<!-- Hidden SPA Page -->
<div id="secretPage">

    <button id="closeBtn">×</button>

    <img
        id="secretImage"
        src="sakshi.jpg"
        alt="Secret Page"
    >

</div>

<script>

const passwordBox = document.getElementById("secretPassword");
const secretPage = document.getElementById("secretPage");
const closeBtn = document.getElementById("closeBtn");

passwordBox.addEventListener("keydown", function(e){

    if(e.key === "Enter"){

        if(passwordBox.value === "Lotus210506"){

            secretPage.classList.add("active");

            history.pushState(
                {secret:true},
                "",
                "#sakshi"
            );

            passwordBox.value = "";
        }
    }
});

closeBtn.addEventListener("click", () => {

    secretPage.classList.remove("active");

    history.pushState(
        {},
        "",
        "/"
    );
});

window.addEventListener("popstate", () => {

    secretPage.classList.remove("active");
});

</script>

</body>
</html>
