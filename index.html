<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prem Tilokani | Connect</title>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}
body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:#f9fafb;
    color:#0f172a;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}
.container{
    width:100%;
    max-width:420px;
    background:#ffffff;
    padding:50px 30px;
    border-radius:12px;
    box-shadow:
        0 10px 25px rgba(0,0,0,.05),
        0 4px 10px rgba(0,0,0,.03);
    text-align:center;
}
h1{
    font-size:1.9rem;
    font-weight:600;
    color:#1e293b;
    margin-bottom:30px;
}
.links{
    display:flex;
    flex-direction:column;
    gap:14px;
}
.links a{
    display:block;
    width:100%;
    padding:15px 20px;
    background:#0B2545;
    color:#ffffff;
    text-decoration:none;
    font-size:1rem;
    font-weight:500;
    border:1px solid #13315C;
    border-radius:8px;
    transition:all .25s ease;
}
.links a:hover{
    background:#134074;
    transform:translateY(-2px);
    box-shadow:
        0 8px 20px rgba(11,37,69,.18);
}
.links a:active{
    transform:translateY(0);
}
.footer{
    margin-top:25px;
    font-size:.85rem;
    color:#94a3b8;
}
</style>
</head>
<body>
<div class="container">
    <h1>Prem Tilokani</h1>
    <div class="links">
        <a href="https://www.linkedin.com/in/prem-tilokani-8b85b624b" target="_blank" rel="noopener noreferrer">
            LinkedIn
        </a>
        <a href="https://github.com/blurry-eyez" target="_blank" rel="noopener noreferrer">
            GitHub
        </a>
        <a href="https://wa.me/916351929739" target="_blank" rel="noopener noreferrer">
            WhatsApp
        </a>
        <a href="https://instagram.com/prem_tilokani" target="_blank" rel="noopener noreferrer">
            Instagram
        </a>
    </div>
    
        
</div>
</body>
</html>
