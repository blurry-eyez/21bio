<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prem Tilokani | Connect</title>
  
  <style>
    /* Reset and Base Styles */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #f9fafb; /* Extremely light gray/white for a clean look */
      color: #0f172a; /* Very dark slate/blue for high contrast */
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    /* Main Container */
    .container {
      width: 100%;
      max-width: 400px;
      background-color: #ffffff;
      padding: 50px 30px;
      border-radius: 8px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
      text-align: center;
    }

    /* Typography */
    h1 {
      font-size: 1.75rem;
      font-weight: 600;
      letter-spacing: -0.5px;
      color: #1e293b;
      margin-bottom: 30px;
    }

    /* Link Buttons */
    .links {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .links a {
      display: block;
      width: 100%;
      padding: 14px 20px;
      background-color: #ffffff;
      color: #0f172a;
      text-decoration: none;
      font-size: 1rem;
      font-weight: 500;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      transition: all 0.2s ease-in-out;
    }

    /* Hover Effects */
    .links a:hover {
      background-color: #0f172a;
      color: #ffffff;
      border-color: #0f172a;
      transform: translateY(-1px);
      box-shadow: 0 4px 6px -1px rgba(15, 23, 42, 0.1);
    }

    .links a:active {
      transform: translateY(0);
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Prem Tilokani</h1>

    <div class="links">
      <a href="https://www.linkedin.com/in/prem-tilokani-8b85b624b" target="_blank" rel="noopener noreferrer">LinkedIn</a>
      <a href="https://github.com/blurry-eyez" target="_blank" rel="noopener noreferrer">GitHub</a>
      <a href="https://wa.me/916351929739" target="_blank" rel="noopener noreferrer">WhatsApp</a>
      <a href="https://instagram.com/prem_tilokani" target="_blank" rel="noopener noreferrer">Instagram</a>
      <a href="https://www.snapchat.com/add/prem.3618" target="_blank" rel="noopener noreferrer">Snapchat</a>
    </div>
  </div>

</body>
</html>
