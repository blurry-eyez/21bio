<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prem Tilokani | Connect</title>

<style>
/* RESET */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

/* BODY */
body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:#f9fafb;
    color:#0f172a;
}

/* ==========================
   MAIN PAGE
========================== */

#mainPage{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.container{
    width:100%;
    max-width:400px;
    background:#fff;
    padding:50px 30px;
    border-radius:8px;
    box-shadow:
        0 4px 6px -1px rgba(0,0,0,.05),
        0 2px 4px -1px rgba(0,0,0,.03);
    text-align:center;
}

h1{
    font-size:1.75rem;
    font-weight:600;
    color:#1e293b;
    margin-bottom:30px;
}

.links{
    display:flex;
    flex-direction:column;
    gap:12px;
}

.links a{
    display:block;
    width:100%;
    padding:14px 20px;

    background:#0f172a;      /* Dark Navy */
    color:#ffffff;

    text-decoration:none;
    font-size:1rem;
    font-weight:500;

    border:1px solid #1e3a5f;

    border-radius:6px;

    transition:.25s ease;
}
.links a:hover{
    background:#1e3a5f;
    color:#ffffff;

    transform:translateY(-2px);

    box-shadow:
        0 8px 20px rgba(15,23,42,.18);
}
/* ==========================
   SECRET PASSWORD FIELD
========================== */

#secretPassword{
    position:fixed;
    bottom:8px;
    right:8px;

    width:40px;
    height:18px;

    opacity:0.02;

    border:none;
    background:transparent;
    outline:none;

    z-index:9999;
}

/* ==========================
   SAKSHI PAGE
========================== */

#sakshiPage{
    display:none;
    width:100%;
    min-height:100vh;
    background:#ffffff;
}

#sakshiPage img{
    width:100%;
    height:auto;
    display:block;
}

/* BACK BUTTON */

#backBtn{
    position:fixed;

    top:20px;
    left:20px;

    z-index:10000;

    border:none;
    background:rgba(255,255,255,.85);

    backdrop-filter:blur(12px);

    padding:10px 15px;

    border-radius:12px;

    font-size:18px;
    cursor:pointer;

    box-shadow:
        0 4px 12px rgba(0,0,0,.12);
}
</style>
</head>

<body>

<!-- ==========================
     MAIN PAGE
========================== -->

<div id="mainPage">

    <div class="container">

        <h1>Prem Tilokani</h1>

        <div class="links">

            <a href="https://www.linkedin.com/in/prem-tilokani-8b85b624b" target="_blank">
                LinkedIn
            </a>

            <a href="https://github.com/blurry-eyez" target="_blank">
                GitHub
            </a>

            <a href="https://wa.me/916351929739" target="_blank">
                WhatsApp
            </a>

            <a href="https://instagram.com/prem_tilokani" target="_blank">
                Instagram
            </a>

        </div>

    </div>

</div>

<!-- ==========================
     HIDDEN PASSWORD FIELD
========================== -->

<input
    type="password"
    id="secretPassword"
    autocomplete="off"
/>

<!-- ==========================
     SECRET PAGE
========================== -->

<div id="sakshiPage">

    <button id="backBtn">← Back</button>

    <!-- CHANGE THIS TO YOUR FILE NAME -->
    <img
        src="sakshi.png"
        alt="Sakshi Magazine"
    >

</div>

<script>

const passwordBox = document.getElementById("secretPassword");
const mainPage = document.getElementById("mainPage");
const sakshiPage = document.getElementById("sakshiPage");
const backBtn = document.getElementById("backBtn");

/* OPEN SECRET PAGE */

passwordBox.addEventListener("keydown", function(e){

    if(
        e.key === "Enter" &&
        passwordBox.value === "Lotus210506"
    ){

        mainPage.style.display = "none";
        sakshiPage.style.display = "block";

        window.scrollTo(0,0);

        history.pushState(
            { page:"sakshi" },
            "",
            "#sakshi"
        );

        passwordBox.value = "";
    }

});

/* BACK BUTTON */

backBtn.addEventListener("click", function(){

    sakshiPage.style.display = "none";
    mainPage.style.display = "flex";

    history.pushState(
        {},
        "",
        "/"
    );

});

/* PHONE BACK BUTTON */

window.addEventListener("popstate", function(){

    sakshiPage.style.display = "none";
    mainPage.style.display = "flex";

});

</script>

</body>
</html>
